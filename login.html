<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <link rel="stylesheet" href="style/login.css">
</head>

<body>
    <img id="LoginImage" src="LogInPage.png" alt="Login page background image">
    <div class="container">
        <div class="logo">
            <img src="logo.jpg" alt="logo" id="logo">
            <h1 id="heading1"><b>Log in</b></h1>
         </div>
        <div class="login-form">
            <form action="yourFormHandler.html" method="POST">
                <label for="username">Email or Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your email or username" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>

                <button type="submit" class="submit-btn">Log in</button>
            </form>
        </div>
    </div>
</body>

</html>
